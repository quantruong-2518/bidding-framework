name: bid-framework

# Compose v2 — no top-level `version:` (deprecated). All services declare
# healthchecks so downstream `depends_on: service_healthy` blocks behave.

services:
  postgres:
    image: postgres:16-alpine
    container_name: bid-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bidding
      POSTGRES_PASSWORD: bidding
      POSTGRES_DB: bidding_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bidding -d bidding_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: bid-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # qdrant image lacks curl/wget — fall back to bash /dev/tcp probe
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: bid-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s

  temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: bid-temporal
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: bidding
      POSTGRES_PWD: bidding
      POSTGRES_SEEDS: postgres
    ports:
      - "7233:7233"
    healthcheck:
      test: ["CMD-SHELL", "tctl --address $$(hostname):7233 cluster health | grep -q SERVING"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  temporal-ui:
    image: temporalio/ui:2.27.2
    container_name: bid-temporal-ui
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000,http://localhost:3001
    ports:
      - "8088:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: bid-keycloak
    restart: unless-stopped
    # Phase 3.2a — `--import-realm` provisions the `bidding` realm on first
    # boot from files mounted under /opt/keycloak/data/import. Idempotent:
    # subsequent starts see the realm already exists and skip. Drop the
    # `keycloak_data` volume to force a re-import.
    command: ["start-dev", "--import-realm", "--health-enabled=true"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
    ports:
      - "8080:8080"
      - "9000:9000"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      # Keycloak 24 exposes /health/ready on the main HTTP port 8080 (management port 9000 is KC 25+).
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080; printf 'GET /health/ready HTTP/1.0\\r\\n\\r\\n' >&3; grep -q 'UP' <&3"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: bid-api-gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      PORT: "3000"
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/bidding
      KEYCLOAK_CLIENT_ID: bidding-api
      REDIS_URL: redis://redis:6379
      AI_SERVICE_URL: http://ai-service:8001
      POSTGRES_URL: postgresql://bidding:bidding@postgres:5432/bidding_db
      # Phase 3.5 — browser-facing Langfuse URL; 404 from /bids/:id/trace-url
      # when unset (frontend hides the button).
      LANGFUSE_WEB_URL: ${LANGFUSE_WEB_URL:-}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: bid-ai-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      QDRANT_URL: http://qdrant:6333
      TEMPORAL_HOST: temporal:7233
      REDIS_URL: redis://redis:6379
      POSTGRES_URL: postgresql://bidding:bidding@postgres:5432/bidding_db
      KB_VAULT_PATH: /kb-vault
      # Phase 3.5 — Langfuse observability. Keys unset by default: tracer
      # resolves to the no-op path and emits zero HTTP traffic.
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse-server:3000}
      LANGFUSE_RELEASE: ${LANGFUSE_RELEASE:-phase-3.5}
    volumes:
      # Main vault stays read-only so SME-authored notes can't be mutated by
      # the pipeline. The per-bid workspace (Phase 2.7) needs to write — shadow
      # mount that subfolder read-write on top.
      - ./kb-vault:/kb-vault:ro
      - ./kb-vault/bids:/kb-vault/bids:rw
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  ai-worker:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: bid-ai-worker
    restart: unless-stopped
    command: ["python", "worker.py"]
    # ai-service Dockerfile bakes an HTTP healthcheck for port 8001 — worker.py
    # does not listen. Disable the inherited probe; rely on `restart: unless-stopped`
    # for liveness (worker crash → container exits → compose restarts it).
    healthcheck:
      disable: true
    depends_on:
      temporal:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      QDRANT_URL: http://qdrant:6333
      TEMPORAL_HOST: temporal:7233
      REDIS_URL: redis://redis:6379
      POSTGRES_URL: postgresql://bidding:bidding@postgres:5432/bidding_db
      KB_VAULT_PATH: /kb-vault
      # Phase 3.5 — Langfuse observability (ai-worker is where S3 activities
      # run, so it carries the keys too). No-op when unset.
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse-server:3000}
      LANGFUSE_RELEASE: ${LANGFUSE_RELEASE:-phase-3.5}
    volumes:
      # Main vault stays read-only so SME-authored notes can't be mutated by
      # the pipeline. The per-bid workspace (Phase 2.7) needs to write — shadow
      # mount that subfolder read-write on top.
      - ./kb-vault:/kb-vault:ro
      - ./kb-vault/bids:/kb-vault/bids:rw

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000
        NEXT_PUBLIC_WS_URL: ws://localhost:3000
        NEXT_PUBLIC_KEYCLOAK_URL: http://localhost:8080
    container_name: bid-frontend
    restart: unless-stopped
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_WS_URL: ws://localhost:3000
      NEXT_PUBLIC_KEYCLOAK_URL: http://localhost:8080
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Phase 3.5 — self-hosted Langfuse observability.
  # Default `docker compose up -d` skips these; start with
  # `docker compose --profile observability up -d langfuse-db-init langfuse-server`.
  # First run: open http://localhost:3002, create admin user + project,
  # copy public + secret keys into `.env`, then rebuild ai-service + ai-worker.
  langfuse-db-init:
    image: postgres:16-alpine
    container_name: bid-langfuse-db-init
    profiles: ["observability"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: bidding
      PGPASSWORD: bidding
      PGDATABASE: bidding_db
    # Idempotent create of the langfuse database — the container exits 0 on
    # subsequent runs because `SELECT 1 FROM pg_database WHERE datname='langfuse_db'`
    # short-circuits the CREATE. Reuses existing postgres (D9: no extra container).
    entrypoint: ["sh", "-c"]
    command:
      - |
        psql -tAc "SELECT 1 FROM pg_database WHERE datname='langfuse_db'" | grep -q 1 \
          || psql -c "CREATE DATABASE langfuse_db"
    restart: "no"

  langfuse-server:
    image: langfuse/langfuse:2.59
    container_name: bid-langfuse-server
    profiles: ["observability"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      langfuse-db-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://bidding:bidding@postgres:5432/langfuse_db
      NEXTAUTH_URL: http://localhost:3002
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-change-me-please-32-chars-minimum-xxxxxx}
      SALT: ${LANGFUSE_SALT:-change-me-please-salt-32-chars-xxxxxxxx}
      TELEMETRY_ENABLED: "false"
      LANGFUSE_INIT_PROJECT_NAME: bidding-framework
    ports:
      - "3002:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/public/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
  qdrant_data:
  keycloak_data:
